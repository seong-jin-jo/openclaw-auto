services:
  openclaw-gateway:
    build:
      context: ./openclaw
      dockerfile: Dockerfile
      args:
        OPENCLAW_EXTENSIONS: "threads-publish threads-queue threads-style threads-insights threads-search threads-growth"
    volumes:
      - ./config:/home/node/.openclaw       # openclaw.json + cron/jobs.json
      - ./data:/home/node/data              # 데이터 파일
    env_file: .env
    environment:
      HOME: /home/node
      TZ: Asia/Seoul
    network_mode: host
    init: true
    restart: unless-stopped
    command: ["node", "dist/index.js", "gateway", "--bind", "lan", "--port", "18789"]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:18789/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  dashboard:
    build: ./dashboard
    ports:
      - "3456:3456"
    volumes:
      - ./data:/app/data
      - ./dashboard/server.py:/app/server.py
      - ./dashboard/static:/app/static
    environment:
      DATA_DIR: /app/data
      DASHBOARD_PORT: "3456"
    restart: unless-stopped
