services:
  openclaw-gateway:
    build:
      context: ./openclaw
      dockerfile: Dockerfile
      network: host
      args:
        OPENCLAW_EXTENSIONS: "threads-publish threads-queue threads-style threads-insights threads-search threads-growth"
    volumes:
      - ./config:/home/node/.openclaw       # openclaw.json + cron/jobs.json
      - ./data:/home/node/data              # 데이터 파일
    env_file: .env
    environment:
      HOME: /home/node
      TZ: Asia/Seoul
    network_mode: host
    init: true
    restart: unless-stopped
    command: ["node", "dist/index.js", "gateway", "--bind", "lan", "--port", "18790"]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://172.25.34.11:18790/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  dashboard:
    build:
      context: ./dashboard
      network: host
    ports:
      - "34661:34661"
    volumes:
      - ./data:/app/data
      - ./config:/app/config:ro
      - ./dashboard/server.py:/app/server.py
      - ./dashboard/static:/app/static
    env_file: .env
    environment:
      DATA_DIR: /app/data
      CONFIG_DIR: /app/config
      DASHBOARD_PORT: "34661"
      DASHBOARD_AUTH_TOKEN: ${DASHBOARD_AUTH_TOKEN:-}
    restart: unless-stopped
